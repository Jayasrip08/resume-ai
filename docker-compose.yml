version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: resume_ai_db
    restart: always
    environment:
      POSTGRES_DB: resume_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: resume_ai_backend
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=resume_ai
      - DB_USER=postgres
      - DB_PASSWORD=root
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend/chroma_store:/app/chroma_store
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: resume_ai_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
